<style>
   body {
            margin: 0;
            padding: 0;
            /* ✨ 甘すぎない「朝霧」のようなグラデーション */
            background: linear-gradient(135deg, #f5f7fa 0%, #e6f0ff 100%);
            font-family: 'Segoe UI', sans-serif;
            color: #445; /* 少しグレー寄りの柔らかい黒 */
            overflow-x: hidden;
        }
        .container {
            max-width: 1000px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.98); /* 透明度を少し下げて高級感を */
            border-radius: 20px;
            /* ✨ ピンクから「空色」の影に変更 */
            box-shadow: 0 10px 40px rgba(168, 196, 255, 0.25);
            overflow: hidden;
        }
        header {
            /* ✨ 派手なピンクを抑えて、洗練された「ブルーグラデ」に */
            background: linear-gradient(135deg, #a8c4ff 0%, #d8e6ff 100%);
            color: #556; /* 文字色も少し落ち着かせます */
            text-align: center;
            padding: 45px 20px;
            position: relative;
        }
        header h1 {
            margin: 0;
            font-size: 2.6em;
            text-shadow: 1px 1px 3px rgba(255,255,255,0.8);
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 1.1em;
            margin-top: 12px;
            opacity: 0.8;
            color: #667;
        }
        .photo-item:hover {
            transform: translateY(-8px);
            /* ✨ ホバー時も「水色の光」が漏れる演出 */
            box-shadow: 0 15px 30px rgba(168, 196, 255, 0.4);
        }
        footer {
            text-align: center;
            padding: 30px;
            /* ✨ 足元はほんのりしたラベンダー色で */
            background: #f8faff;
            color: #889;
            font-size: 0.95em;
            border-top: 1px solid #eef2ff;
        }
        .heart {
            position: absolute;
            font-size: 2.0em;
            animation: float 6s infinite ease-in-out;
            /* ✨ ハートは真っ白にして、結晶のように降らせます */
            color: #ffffff;
            opacity: 0.7;
        }
        /* ✨ 戻るボタンもユイちゃんカラーに変更 */
        .back-button {
            color: #7a9bff !important;
            border: 1px solid rgba(122, 155, 255, 0.3) !important;
        }
        .back-button:hover {
            background: rgba(122, 155, 255, 0.8) !important;
            color: white !important;
        }
</style>
    
    <title>ユイとケンちゃんの思い出 ♡</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffe6f2, #e6f0ff);
            font-family: 'Segoe UI', sans-serif;
            color: #333;
            overflow-x: hidden;
        }
        .container {
            max-width: 1000px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
            overflow: hidden;
        }
        header {
            background: linear-gradient(90deg, #ff9ed8, #a8c4ff);
            color: white;
            text-align: center;
            padding: 40px 20px;
            position: relative;
        }
        header h1 {
            margin: 0;
            font-size: 2.8em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .subtitle {
            font-size: 1.3em;
            margin-top: 10px;
            opacity: 0.95;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 40px;
        }
        .photo-item {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .photo-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 25px rgba(255, 105, 180, 0.3);
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        footer {
            text-align: center;
            padding: 25px;
            background: #fff0f8;
            color: #ff6eb8;
            font-size: 1.1em;
        }
        .heart {
            position: absolute;
            font-size: 2.5em;
            animation: float 6s infinite ease-in-out;
            opacity: 0.6;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }
    </style>
</head>
